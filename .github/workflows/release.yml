name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Install Composer dependencies (no dev)
        run: composer install --no-dev --prefer-dist --no-progress

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          mkdir -p dist
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.gitignore' \
            --exclude='.wp-env.json' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpstan.neon' \
            --exclude='phpstan-bootstrap.php' \
            --exclude='phpunit.xml.dist' \
            --exclude='webpack.config.js' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='PLAN.md' \
            --exclude='assets/src' \
            --exclude='dist' \
            ./ dist/custom-xml-sitemap/
          cd dist && zip -r custom-xml-sitemap-${{ steps.version.outputs.version }}.zip custom-xml-sitemap

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/custom-xml-sitemap-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
