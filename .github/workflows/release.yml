name: Release

on:
  push:
    branches:
      - release

jobs:
  release:
    name: Build and Tag Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build assets
        run: pnpm run build

      - name: Install Composer dependencies (no dev)
        run: composer install --no-dev --prefer-dist --no-progress

      - name: Get version from plugin header
        id: version
        run: |
          VERSION=$(grep -Po "Version:\s*\K[0-9.]+" custom-xml-sitemap.php)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release tag with built assets
        run: |
          echo "Releasing version ${{ steps.version.outputs.version }} ..."
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout -b "release-${{ steps.version.outputs.version }}"
          git add -f assets/build/*
          git commit -m "Release ${{ steps.version.outputs.version }}"
          git tag "${{ steps.version.outputs.version }}"
          git push --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release archive
        run: |
          mkdir -p dist
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.wp-env.json' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpstan.neon' \
            --exclude='phpstan-bootstrap.php' \
            --exclude='phpunit.xml.dist' \
            --exclude='webpack.config.js' \
            --exclude='package.json' \
            --exclude='pnpm-lock.yaml' \
            --exclude='PLAN.md' \
            --exclude='assets/src' \
            --exclude='dist' \
            ./ dist/custom-xml-sitemap/
          cd dist && zip -r custom-xml-sitemap-${{ steps.version.outputs.version }}.zip custom-xml-sitemap

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: dist/custom-xml-sitemap-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
